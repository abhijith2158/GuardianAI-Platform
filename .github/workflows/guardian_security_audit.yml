name: GuardianAI Security Audit

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run GuardianAI CI Audit
        run: python security_audit.py . --ci
        
      - name: Upload Security Roadmap
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-roadmap
          path: reports/*.md
