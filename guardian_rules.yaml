rules:
  - id: CUSTOM.HARDCODED_SECRET
    message: Potential hardcoded secret token detected.
    pattern: "(?i)(api[_-]?key|secret|token)\\s*[:=]\\s*['\\\"][A-Za-z0-9_\\-]{12,}['\\\"]"
    severity: 7
    file_extensions:
      - ".py"
      - ".js"
      - ".ts"
      - ".tsx"
      - ".jsx"
      - ".env"
